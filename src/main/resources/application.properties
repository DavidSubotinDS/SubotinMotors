spring.mvc.view.prefix=/view/
spring.mvc.view.suffix=.jsp

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Zero-configuration local development database. Use the mysql profile for deployment.
spring.datasource.url=jdbc:h2:file:./data/subotin-motors;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

server.error.include-message=never
management.endpoints.web.exposure.include=health,info

# Educational parts-store sandbox integration only. Live Stripe keys are rejected in code.
payments.stripe.enabled=${STRIPE_ENABLED:false}
payments.stripe.secret-key=${STRIPE_SECRET_KEY:}
payments.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
payments.stripe.currency=${STRIPE_CURRENCY:eur}
payments.stripe.platform-fee-basis-points=${STRIPE_PLATFORM_FEE_BPS:250}
payments.stripe.base-url=${APP_BASE_URL:http://localhost:8080}

# Password reset mail. The safe local default logs reset links instead of sending mail.
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.mail.mode=${APP_MAIL_MODE:log}
app.mail.from=${APP_MAIL_FROM:no-reply@subotinmotors.local}
password-reset.expiry=${PASSWORD_RESET_EXPIRY:PT30M}

# Configure these only when APP_MAIL_MODE=smtp.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

auction.notifications.ending-soon-window=${AUCTION_ENDING_SOON_WINDOW:PT24H}
auction.notifications.scan-interval-ms=${AUCTION_NOTIFICATION_SCAN_MS:300000}
auction.notifications.scheduling-enabled=${AUCTION_NOTIFICATION_SCHEDULING:true}
