spring.mvc.view.prefix=/view/
spring.mvc.view.suffix=.jsp

spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Zero-configuration local development database. Use the mysql profile for deployment.
spring.datasource.url=jdbc:h2:file:./data/subotin-motors;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

server.error.include-message=never
management.endpoints.web.exposure.include=health,info

# Educational sandbox integration only. Live Stripe keys are rejected in code.
# Stripe Connect is disabled until sandbox credentials are supplied.
payments.stripe.enabled=${STRIPE_ENABLED:false}
payments.stripe.secret-key=${STRIPE_SECRET_KEY:}
payments.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
payments.stripe.currency=${STRIPE_CURRENCY:eur}
payments.stripe.platform-fee-basis-points=${STRIPE_PLATFORM_FEE_BPS:250}
payments.stripe.base-url=${APP_BASE_URL:http://localhost:8080}
